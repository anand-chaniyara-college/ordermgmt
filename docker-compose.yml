services:
  redis:
    image: redis:7
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    ports:
      - "8081:8081"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DB_URL: "jdbc:postgresql://host.docker.internal:5432/ordermgmt?currentSchema=ordermgmt&sslmode=disable"
      SPRING_REDIS_HOST: "redis"
      SPRING_REDIS_PORT: "6379"
