<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
            color: #333;
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            background: #16a085;
            color: white;
            padding: 20px;
            text-align: center;
            border-radius: 10px 10px 0 0;
        }

        .content {
            background: #fff;
            padding: 30px;
            border: 1px solid #eee;
            border-radius: 0 0 10px 10px;
        }

        .report-summary {
            display: flex;
            justify-content: space-between;
            margin-bottom: 30px;
            background: #f9f9f9;
            padding: 20px;
            border-radius: 5px;
        }

        .stat-box {
            text-align: center;
            flex: 1;
        }

        .stat-val {
            font-size: 1.5em;
            font-weight: bold;
            color: #16a085;
        }

        .stat-label {
            font-size: 0.9em;
            color: #777;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        th {
            background: #f2f2f2;
            padding: 12px;
            text-align: left;
            border-bottom: 2px solid #ddd;
        }

        td {
            padding: 12px;
            border-bottom: 1px solid #eee;
        }

        .footer {
            text-align: center;
            margin-top: 20px;
            font-size: 0.8em;
            color: #777;
        }
    </style>
</head>

<body>
    <div class="header">
        <h1 th:text="${reportType}">Analytics Report</h1>
    </div>
    <div class="content">
        <p>Hello <span th:text="${name}">Admin</span>,</p>
        <p>Attached below is the requested report for the period <span
                th:text="${reportData.startDate}">2026-01-01</span> to <span
                th:text="${reportData.endDate}">2026-01-31</span>.</p>

        <div class="report-summary">
            <div class="stat-box">
                <div class="stat-val" th:text="${reportData.totalSoldItems}">0</div>
                <div class="stat-label">Unique Items Sold</div>
            </div>
            <div class="stat-box">
                <div class="stat-val" th:text="${reportData.totalSoldQty}">0</div>
                <div class="stat-label">Total Quantity</div>
            </div>
            <div class="stat-box">
                <div class="stat-val" th:text="${'$' + reportData.totalRevenue}">$0.00</div>
                <div class="stat-label">Total Revenue</div>
            </div>
        </div>

        <h3>Item Breakdown</h3>
        <table>
            <thead>
                <tr>
                    <th>Item Name</th>
                    <th style="text-align: center;">Sales Count</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="item : ${reportData.items}">
                    <td th:text="${item.itemName}">Item</td>
                    <td style="text-align: center;" th:text="${item.totalSoldItems}">0</td>
                </tr>
            </tbody>
        </table>
    </div>
    <div class="footer">
        <p>Generated on <span
                th:text="${#temporals.format(#temporals.createNow(), 'yyyy-MM-dd HH:mm:ss')}">2026-03-11</span></p>
    </div>
</body>

</html>
