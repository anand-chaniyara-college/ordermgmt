# Server Configuration
server.port=8081
spring.application.name=ordermgmt

# Database Configuration (PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/testdb?currentSchema=ordermgmt
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Database Configuration (MySQL)
# spring.datasource.url=jdbc:mysql://localhost:3306/ordermgmt?createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true&useSSL=false
# spring.datasource.username=root
# spring.datasource.password=root
# spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate

# Postgres Dialect
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# MySQL Dialect (if using MySQL)
# spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

spring.jpa.properties.hibernate.default_schema=ordermgmt
spring.jpa.properties.hibernate.hbm2ddl.create_namespaces=true

# PRODUCTION: JPA must NEVER create or alter the schema automatically.
# Schema is managed exclusively by src/main/resources/schema.sql (first run)
# and manual SQL migrations going forward.
spring.jpa.hibernate.ddl-auto=none

spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# SQL Init: Spring Boot runs schema.sql on every startup.
# All statements use IF NOT EXISTS / ON CONFLICT DO NOTHING, so re-runs are safe no-ops.
spring.sql.init.mode=always
spring.sql.init.platform=postgresql


# Ensure schema.sql executes BEFORE JPA entity binding
spring.jpa.defer-datasource-initialization=true

# Logging
logging.level.org.springframework.security=INFO
logging.level.com.example.ordermgmt=DEBUG

# SMTP for sending
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.ssl.trust=smtp.gmail.com
spring.mail.properties.mail.smtp.ssl.protocols=TLSv1.2
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000
# Swagger / OpenAPI
springdoc.swagger-ui.tags-sorter=alpha
springdoc.swagger-ui.operations-sorter=method
springdoc.swagger-ui.defaultModelsExpandDepth=-1

# JWT Configuration
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION}

# Redis Configuration
spring.data.redis.host=${SPRING_REDIS_HOST}
spring.data.redis.port=${SPRING_REDIS_PORT}
# Performance Tuning for 1M+ Users
spring.data.redis.lettuce.pool.enabled=true
spring.data.redis.lettuce.pool.max-active=50
spring.data.redis.lettuce.pool.max-idle=10
spring.data.redis.lettuce.pool.min-idle=5
spring.data.redis.lettuce.pool.max-wait=500ms

# --- Performance Tuning (HikariCP) ---
spring.datasource.hikari.maximum-pool-size=50
spring.datasource.hikari.minimum-idle=10
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.connection-timeout=5000

# Disable open-in-view to prevent lazy-loading outside transactions
spring.jpa.open-in-view=false
