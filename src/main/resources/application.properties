# Server Configuration
server.port=${SERVER_PORT:8081}
spring.application.name=ordermgmt
spring.config.import=optional:file:.env[.properties]
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# Database Configuration (PostgreSQL)
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/ordermgmt?currentSchema=ordermgmt}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate

# Postgres Dialect
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

spring.jpa.properties.hibernate.default_schema=ordermgmt
spring.jpa.properties.hibernate.hbm2ddl.create_namespaces=true

# Multi-tenancy Configuration
spring.jpa.properties.hibernate.multi_tenancy_strategy=DISCRIMINATOR
spring.jpa.properties.hibernate.tenant_identifier_resolver=com.example.ordermgmt.security.TenantIdentifierResolver

# 'none', 'update', 'create', 'create-drop'
spring.jpa.hibernate.ddl-auto=none

spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# SQL Init: 'never', 'always'
spring.sql.init.mode=never
spring.sql.init.platform=postgresql

# Flyway migration management
spring.jpa.defer-datasource-initialization=false
spring.flyway.enabled=false
spring.flyway.locations=classpath:db/migration
spring.flyway.schemas=ordermgmt
spring.flyway.default-schema=ordermgmt
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=1
spring.flyway.clean-disabled=true
spring.flyway.validate-on-migrate=true

# Logging
logging.level.org.springframework.security=INFO
logging.level.com.example.ordermgmt=DEBUG
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration

# SMTP for sending
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}

spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.ssl.trust=smtp.gmail.com
spring.mail.properties.mail.smtp.ssl.protocols=TLSv1.2
spring.mail.properties.mail.smtp.connectiontimeout=20000
spring.mail.properties.mail.smtp.timeout=20000
spring.mail.properties.mail.smtp.writetimeout=20000
# Swagger / OpenAPI
springdoc.swagger-ui.tags-sorter=alpha
springdoc.swagger-ui.operations-sorter=method
springdoc.swagger-ui.defaultModelsExpandDepth=-1

# JWT Configuration
jwt.secret=${JWT_SECRET}

jwt.expiration=${JWT_EXPIRATION:900000}
app.jwt.refresh.expiration-ms=${JWT_REFRESH_EXPIRATION:172800000}


# Rate Limiting
app.rate-limit.auth.requests=${RATE_LIMIT_REQUESTS:1}
app.rate-limit.auth.window-seconds=${RATE_LIMIT_WINDOW_SECONDS:60}


# Redis Configuration
spring.data.redis.host=${SPRING_REDIS_HOST:localhost}
spring.data.redis.port=${SPRING_REDIS_PORT:6379}

# Performance Tuning for 1M+ Users
spring.data.redis.lettuce.pool.enabled=true
spring.data.redis.lettuce.pool.max-active=50
spring.data.redis.lettuce.pool.max-idle=10
spring.data.redis.lettuce.pool.min-idle=5
spring.data.redis.lettuce.pool.max-wait=500ms

# --- Performance Tuning (HikariCP) ---
spring.datasource.hikari.maximum-pool-size=50
spring.datasource.hikari.minimum-idle=10
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.connection-timeout=5000

# Disable open-in-view to prevent lazy-loading outside transactions
spring.jpa.open-in-view=false

# Management / Actuator
management.endpoints.web.exposure.include=prometheus,health,info
management.endpoint.prometheus.enabled=true
management.metrics.export.prometheus.enabled=true

# Order Staleness
app.order.stale-minutes=${ORDER_STALE_MINUTES:60}
# Scheduler Configuration
app.scheduler.fixed-rate-ms=${SCHEDULER_FIXED_RATE_MS:300000}