# Server Configuration
server.port=8081
spring.application.name=ordermgmt
spring.config.import=optional:file:.env[.properties]

# Default database config (H2 in-memory)
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;INIT=CREATE SCHEMA IF NOT EXISTS ordermgmt
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.properties.hibernate.default_schema=ordermgmt
spring.jpa.hibernate.ddl-auto=create-drop

# SQL init
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# SQL Init: 'never', 'always'
spring.sql.init.mode=never
spring.sql.init.platform=postgresql

# Flyway migration management
spring.jpa.defer-datasource-initialization=false
spring.flyway.enabled=false
spring.flyway.locations=classpath:db/migration
spring.flyway.schemas=ordermgmt
spring.flyway.default-schema=ordermgmt
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=1
spring.flyway.clean-disabled=true
spring.flyway.validate-on-migrate=true

# Logging
logging.level.org.springframework.security=INFO
logging.level.com.example.ordermgmt=DEBUG
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration

# SMTP for sending
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.ssl.trust=smtp.gmail.com
spring.mail.properties.mail.smtp.ssl.protocols=TLSv1.2
spring.mail.properties.mail.smtp.connectiontimeout=20000
spring.mail.properties.mail.smtp.timeout=20000
spring.mail.properties.mail.smtp.writetimeout=20000
# Swagger / OpenAPI
springdoc.swagger-ui.tags-sorter=alpha
springdoc.swagger-ui.operations-sorter=method
springdoc.swagger-ui.defaultModelsExpandDepth=-1

# JWT Configuration
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION}
app.jwt.refresh.expirationMs=${JWT_REFRESH_EXPIRATION}

# Rate Limiting
app.rate-limit.auth.requests=${RATE_LIMIT_REQUESTS}
app.rate-limit.auth.window-seconds=${RATE_LIMIT_WINDOW_SECONDS}

# Redis Configuration
spring.data.redis.host=${SPRING_REDIS_HOST}
spring.data.redis.port=${SPRING_REDIS_PORT}
# Performance Tuning for 1M+ Users
spring.data.redis.lettuce.pool.enabled=true
spring.data.redis.lettuce.pool.max-active=50
spring.data.redis.lettuce.pool.max-idle=10
spring.data.redis.lettuce.pool.min-idle=5
spring.data.redis.lettuce.pool.max-wait=500ms

# --- Performance Tuning (HikariCP) ---
spring.datasource.hikari.maximum-pool-size=50
spring.datasource.hikari.minimum-idle=10
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.connection-timeout=5000

# Disable open-in-view to prevent lazy-loading outside transactions
spring.jpa.open-in-view=false
