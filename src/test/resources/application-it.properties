# PostgreSQL Integration Testing Configuration
# Activated with -Dspring.profiles.active=it

spring.config.import=optional:file:.env[.properties]

spring.datasource.url=jdbc:postgresql://localhost:5432/test_ordermgmt?currentSchema=test_ordermgmt
spring.datasource.driverClassName=org.postgresql.Driver
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.default_schema=test_ordermgmt
spring.jpa.hibernate.ddl-auto=none

spring.sql.init.mode=never
spring.sql.init.platform=postgresql
spring.sql.init.schema-locations=classpath:test_schema.sql

spring.jpa.defer-datasource-initialization=false

spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# JWT Configuration for Test
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION}
app.jwt.refresh.expirationMs=${JWT_REFRESH_EXPIRATION}

# Rate Limiting for Test
app.rate-limit.auth.requests=${RATE_LIMIT_REQUESTS}
app.rate-limit.auth.window-seconds=${RATE_LIMIT_WINDOW_SECONDS}

# Mail Configuration for Test
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.host=localhost
spring.mail.port=1025
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false

spring.flyway.enabled=false
