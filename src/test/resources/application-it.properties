# PostgreSQL Integration Testing Configuration
# Activated with -Dspring.profiles.active=it

spring.config.import=optional:file:.env[.properties]

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/test_ordermgmt?currentSchema=itest_ordermgmt}
spring.datasource.driverClassName=org.postgresql.Driver
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.default_schema=itest_ordermgmt
spring.jpa.hibernate.ddl-auto=none

spring.sql.init.mode=never
spring.sql.init.schema-locations=classpath:test_schema.sql
spring.sql.init.platform=postgresql

spring.jpa.defer-datasource-initialization=false
spring.task.scheduling.enabled=false

spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# JWT Configuration for Test
jwt.secret=${JWT_SECRET:testSecretKeyWithAtLeast256BitsForHS256Algorithm}
jwt.expiration=${JWT_EXPIRATION:3600000}
app.jwt.refresh.expiration-ms=${JWT_REFRESH_EXPIRATION:172800000}

# Rate Limiting for Test
app.rate-limit.auth.requests=${RATE_LIMIT_REQUESTS:1000}
app.rate-limit.auth.window-seconds=${RATE_LIMIT_WINDOW_SECONDS:1}

# Redis Configuration for Test
spring.data.redis.host=${SPRING_REDIS_HOST:localhost}
spring.data.redis.port=${SPRING_REDIS_PORT:6379}

# Order Staleness
app.order.stale-minutes=${ORDER_STALE_MINUTES:60}
# Scheduler Configuration
app.scheduler.fixed-rate-ms=${SCHEDULER_FIXED_RATE_MS:300000}

# Multi-tenancy Configuration (Required as Hibernate now instantiates the resolver directly via properties)
spring.jpa.properties.hibernate.multi_tenancy_strategy=DISCRIMINATOR
spring.jpa.properties.hibernate.tenant_identifier_resolver=com.example.ordermgmt.security.TenantIdentifierResolver

# Mail Configuration for Test (synchronised with production config)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.ssl.trust=smtp.gmail.com
spring.mail.properties.mail.smtp.ssl.protocols=TLSv1.2
spring.mail.properties.mail.smtp.connectiontimeout=20000
spring.mail.properties.mail.smtp.timeout=20000
spring.mail.properties.mail.smtp.writetimeout=20000

spring.flyway.enabled=false
