spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;INIT=CREATE SCHEMA IF NOT EXISTS ordermgmt
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Tests use JPA-managed DDL (create-drop) against H2 in-memory.
spring.jpa.hibernate.ddl-auto=create-drop
spring.sql.init.mode=never

spring.jpa.defer-datasource-initialization=true
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.enable_lazy_load_no_trans=true

# Schema Configuration
spring.jpa.properties.hibernate.default_schema=ordermgmt

# JWT Configuration for Test
jwt.secret=206040307091A206040307091N206040307091A206040307091N206040307091
jwt.expiration=3600000
app.jwt.refresh.expirationMs=86400000

# Rate Limiting for Test
app.rate-limit.auth.requests=5
app.rate-limit.auth.window-seconds=60

# Mail Configuration for Test
spring.mail.username=test
spring.mail.password=test
spring.mail.host=localhost
spring.mail.port=1025
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false

spring.flyway.enabled=false
